<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Parry Master: Armory Arena</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui-layer">
            <div id="boss-info">
                <span id="level-display">SELECT STAGE TO START</span>
                <div id="boss-hp-bar"><div id="boss-hp"></div></div>
            </div>
            <div id="player-hp">HP: ❤️❤️❤️</div>
            <div id="score">Combo: 0 | Parries: 0</div>
        </div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div id="instructions">Select an opponent below and press <strong>SPACEBAR</strong> to start!</div>
        <div id="game-over-screen" class="hidden">
            <h1 id="game-over-title">GAME OVER</h1>
            <p id="game-over-sub">Press R to Restart</p>
            <div id="drop-alert"></div>
        </div>
        
        <!-- DYNAMIC ITEM DETAIL CARD OVERLAY -->
        <div id="item-modal" class="hidden">
            <div id="modal-content">
                <span id="modal-close" onclick="closeModal()">&times;</span>
                <div id="modal-icon">🔘</div>
                <h2 id="modal-title">Shield Name</h2>
                <p id="modal-desc">Ability description goes here...</p>
                <button id="modal-equip-btn" onclick="confirmEquip()">Equip Shield</button>
            </div>
        </div>
    </div>
    
    <div id="armory-case">
        <div class="skin-slot active" id="skin-default" onclick="clickSkin('default')">🔘 Default</div>
        <div class="skin-slot locked" id="skin-brute" onclick="clickSkin('brute')">🔴 Bulwark</div>
        <div class="skin-slot locked" id="skin-chrono" onclick="clickSkin('chrono')">🟣 Chrono</div>
        <div class="skin-slot locked" id="skin-resonance" onclick="clickSkin('resonance')">🔵 Resonance</div>
        <div class="skin-slot locked" id="skin-chaos" onclick="clickSkin('chaos')">🟡 Chaos Core</div>
    </div>
    <div id="badge-case">
        <div class="badge-slot locked" id="badge-flawless" title="Beat any boss without taking damage">🛡️ UNTOUCHABLE</div>
        <div class="badge-slot locked" id="badge-combo" title="Get a 5x Parry Combo">🔥 COMBO KING</div>
        <div class="badge-slot locked" id="badge-reflex" title="Parry at lightning speed">⚡ FAST HANDS</div>
        <div class="badge-slot locked" id="badge-champion" title="Defeat all 4 boss styles">👑 CHAMPION</div>
    </div>
    <div id="selector-panel">
        <button class="stage-btn" onclick="selectStage(1)">ST1: BRUTE</button>
        <button class="stage-btn" onclick="selectStage(2)">ST2: TWIN</button>
        <button class="stage-btn" onclick="selectStage(3)">ST3: TRIAD</button>
        <button class="stage-btn" onclick="selectStage(4)">ST4: CHAOS</button>
    </div>
    <script src="game.js"></script>
</body>
</html>
